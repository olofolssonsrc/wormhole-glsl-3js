<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Three.js WH Control</title>
<style>
  body { margin: 0; overflow: hidden; font-family: sans-serif; }

  #menu {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(20,20,20,0.95);
    padding: 8px;
    border-radius: 8px;
    color: #00ff66;
    max-height: 90vh;
    overflow-y: auto;
  }

  #menuHeader {
    cursor: pointer;
    font-weight: bold;
    margin-bottom: 6px;
    user-select: none;
  }

  #menuContent {
    display: none;
  }

  #menu label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
  }

  #menu input {
    width: 150px;
  }
</style>
</head>
<body>

<div id="menu">
  <div id="menuHeader">controls ▼</div>
  <div id="menuContent"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

// ---------- SCENE ----------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(10,10,10);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);


const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,5);
scene.add(light);

const keys = {};
let shiftDown = false;

window.addEventListener("keydown", e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === "Shift") shiftDown = true;
});

window.addEventListener("keyup", e => {
  keys[e.key.toLowerCase()] = false;
  if (e.key === "Shift") shiftDown = false;
});

let prevMouse = null;

window.addEventListener("mousemove", e => {
  if (!shiftDown) {
    prevMouse = null;
    return;
  }

  controls.enabled = false;

  if (!prevMouse) {
    prevMouse = { x: e.clientX, y: e.clientY };
    return;
  }

  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  prevMouse = { x: e.clientX, y: e.clientY };

  const sensitivity = 0.005;

  // yaw (left/right)
  const yaw = new THREE.Quaternion().setFromAxisAngle(observer.up, -dx * sensitivity);
  observer.forward.applyQuaternion(yaw);

  // pitch (up/down)
  const pitchAxis = observer.right;
  const pitch = new THREE.Quaternion().setFromAxisAngle(pitchAxis, -dy * sensitivity);
  observer.forward.applyQuaternion(pitch);

  observer.forward.normalize();
});

// återaktivera orbit när shift släpps
window.addEventListener("keyup", e => {
  if (e.key === "Shift") {
    controls.enabled = true;
  }
});

const state = {
  rs: 1.5,
  R_outer: 5,
  depth:10,
  wh1: new THREE.Vector3(0,2,3),
  wh2: new THREE.Vector3(13,2,-4)
};



//rs är vid r = 0
function radDeriv(r){
  return r/(Math.sqrt(r*r + state.rs*state.rs));
}

function createWH() {
  const g = new THREE.Group();

  const inner = new THREE.Mesh(
    new THREE.SphereGeometry(1, 32, 32),
    new THREE.MeshStandardMaterial({ color: 0x3399ff })
  );

  const sphereGeo = new THREE.SphereGeometry(1, 32, 32);
  const wireGeoSphere = new THREE.WireframeGeometry(sphereGeo);

  const wireMat = new THREE.LineBasicMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: 0.25
  });

  const outer = new THREE.LineSegments(wireGeoSphere, wireMat);

  const geo = new THREE.RingGeometry(state.rs, state.R_outer, 128, 32);

  const mat = new THREE.ShaderMaterial({
    uniforms: {
      depth: { value: state.depth },
      R_outer: { value: state.R_outer },
      rs: { value: state.rs }
    },
    vertexShader: `
      uniform float depth;
      uniform float R_outer;
      uniform float rs;

      varying float vT;

      float shape(float t) {
        return t*t;
      }

      void main() {
        vec3 p = position;

        float r = length(p.xy);
        float t = clamp((r - rs) / max(R_outer - rs, 0.00001), 0.0, 1.0);

        vT = t;

        float h = depth * 0.5*shape(1.0-t);

        vec2 dir = (r > 0.00001) ? normalize(p.xy) : vec2(1.0, 0.0);

        p.x = dir.x * r;
        p.z = dir.y * r;
        p.y = h;

        gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
      }
    `,
    fragmentShader: `
      varying float vT;

      void main() {
        vec3 colA = vec3(0.5, 0.0, 0.5);
        vec3 colB = vec3(1.0, 0.0, 1.0);

        vec3 col = mix(colA, colB, 1.0 - vT);

        gl_FragColor = vec4(col, 0.3);
      }
    `,
    transparent: true,
    depthWrite: false,
    depthTest: true,
    blending: THREE.NormalBlending,
    side: THREE.DoubleSide
  });

  const tube = new THREE.Mesh(geo, mat);

  g.add(inner);
  g.add(outer);
  g.add(tube);

  g.inner = inner;
  g.outer = outer;
  g.tube = tube;

  return g;
}
const wh1 = createWH();
const wh2 = createWH();
scene.add(wh1, wh2);

// ---------- OBSERVER ----------
const observer = {
  position: new THREE.Vector3(),
  forward: new THREE.Vector3(),
  up: new THREE.Vector3(0,1,0),
  right: new THREE.Vector3()
};

function initObserver() {
  observer.position.copy(state.wh1);
  observer.position.x -= state.R_outer;

  observer.forward.copy(
    new THREE.Vector3().subVectors(state.wh1, observer.position).normalize()
  );

  observer.right.crossVectors(observer.forward, observer.up).normalize();
  observer.up.crossVectors(observer.right, observer.forward).normalize();
}

initObserver();

// ---------- AXIS VIS ----------
const arrowF = new THREE.ArrowHelper(observer.forward, observer.position, 3, 0xff0000);
const arrowR = new THREE.ArrowHelper(observer.right, observer.position, 3, 0x00ff00);
const arrowU = new THREE.ArrowHelper(observer.up, observer.position, 3, 0x0000ff);
scene.add(arrowF, arrowR, arrowU);

// ---------- UPDATE ----------
function updateScene() {
  wh1.outer.scale.setScalar(state.R_outer);
  wh1.inner.scale.setScalar(state.rs);

  wh2.outer.scale.setScalar(state.R_outer);
  wh2.inner.scale.setScalar(state.rs);

  wh1.position.copy(state.wh1);
  wh2.position.copy(state.wh2);
}

function updateObserverMovement(dt) {

  const speed = 5 * dt;

  const d1 = observer.position.distanceTo(state.wh1);
  const d2 = observer.position.distanceTo(state.wh2);

  const center = d1 < d2 ? state.wh1 : state.wh2;
  const inside = (d1 < state.R_outer || d2 < state.R_outer);

  const move = new THREE.Vector3();

  if (keys["w"]) move.addScaledVector(observer.forward, speed);
  if (keys["s"]) move.addScaledVector(observer.forward, -speed);
  if (keys["a"]) move.addScaledVector(observer.right, -speed);
  if (keys["d"]) move.addScaledVector(observer.right, speed);

  observer.position.add(move);

  if (inside) {
    applyInsideGeometry(observer, move, center, dt);

  } else {
      observer.forward.normalize();
      observer.right.crossVectors(observer.forward, observer.up).normalize();
      observer.up.crossVectors(observer.right, observer.forward).normalize();

      observer.radialSpeed = 0;
      observer.angularSpeed = 0;
  }

  /*
  const rollSpeed = 1.5 * dt;

  if (keys["e"] || keys["q"]) {
    const angle = (keys["e"] ? -1 : 1) * rollSpeed;
    const q = new THREE.Quaternion().setFromAxisAngle(observer.forward, angle);
    observer.up.applyQuaternion(q).normalize();
  }
  */

  arrowF.position.copy(observer.position);
  arrowF.setDirection(observer.forward);

  arrowR.position.copy(observer.position);
  arrowR.setDirection(observer.right);

  arrowU.position.copy(observer.position);
  arrowU.setDirection(observer.up);
}
function applyInsideGeometry(observer, move, center, dt) {

  const radial = new THREE.Vector3()
    .subVectors(observer.position, center)
    .normalize();

  const radialSpeed = move.dot(radial);
  const tangSpeed = Math.sqrt(Math.max(0, move.lengthSq() - radialSpeed * radialSpeed));

  observer.radialSpeed = radialSpeed;
  observer.angularSpeed = radial.lengthSq() > 0 ? tangSpeed : 0;

  observer.center = center;

  // Här är enda platsen där din "världskurvatur" ska påverka:
  // observer.forward / up / right får modifieras av dig senare

}

}

}
function e_tot(pt){

}
function p_dist(r){
 return sqrt(r*r + rs*rs);
//  Math.sqrt(r);
}
function e_dist(e){
  return Math.min(rs + e_tot(e)*(R_outer-rs) , rs);
}
*/

function circ_atr(r){
  return r*2*PI;
}


// ---------- UI ----------
const menuContent = document.getElementById("menuContent");
const header = document.getElementById("menuHeader");

let open = false;
header.onclick = () => {
  open = !open;
  menuContent.style.display = open ? "block" : "none";
  header.textContent = open ? "controls ▲" : "controls ▼";
};

function addSlider(label, min, max, step, key, subkey=null) {
  const container = document.createElement("div");

  const l = document.createElement("label");
  const text = document.createElement("span");
  const value = document.createElement("span");

  const input = document.createElement("input");
  input.type = "range";
  input.min = min;
  input.max = max;
  input.step = step;

  const getVal = () => subkey ? state[key][subkey] : state[key];

  input.value = getVal();
  value.textContent = getVal().toFixed(2);
  text.textContent = label;

  input.oninput = () => {
    const v = parseFloat(input.value);

    if(subkey){
      state[key][subkey] = v;
    } else {
      state[key] = v;
    }

    value.textContent = v.toFixed(2);
    updateScene();
  };

  l.appendChild(text);
  l.appendChild(value);
  container.appendChild(l);
  container.appendChild(input);
  menuContent.appendChild(container);
}

// sliders
addSlider("rs", 0.1, 10, 0.1, "rs");
addSlider("R_outer", 0.5, 20, 0.1, "R_outer");

addSlider("wh1.x", -20, 20, 0.1, "wh1", "x");
addSlider("wh1.y", -20, 20, 0.1, "wh1", "y");
addSlider("wh1.z", -20, 20, 0.1, "wh1", "z");

addSlider("wh2.x", -20, 20, 0.1, "wh2", "x");
addSlider("wh2.y", -20, 20, 0.1, "wh2", "y");
addSlider("wh2.z", -20, 20, 0.1, "wh2", "z");

// ---------- RESIZE ----------
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ---------- LOOP ----------
let last = performance.now();
function animate(){
  requestAnimationFrame(animate);

  const now = performance.now();
  const dt = (now - last)/1000;
  last = now;

  updateObserverMovement(dt);

  controls.update();
  renderer.render(scene, camera);
}

updateScene();
animate();

</script>
</body>
</html>
